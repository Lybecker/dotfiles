name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          additional_files: ".bashrc .aliases .exports"
          severity: error
